[package]
name = "cubicbattle"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
android-activity = { version = "0.6", features = ["native-activity"] }
android_logger = "0.14"
log = "0.4"
glam = "0.27"
glow = "0.14"
rand = "0.8"
fontdue = "0.8"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
