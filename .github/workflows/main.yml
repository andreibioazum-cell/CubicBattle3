name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      # 👇 ЭТОТ ШАГ РЕШАЕТ ПРОБЛЕМУ С ПЛАТФОРМОЙ 30
      - name: Install Android SDK Platform
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-30" "platforms;android-34"

      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Build APK
        run: cargo apk build --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle-Release-APK
          path: target/release/apk/cubicbattle.apk
