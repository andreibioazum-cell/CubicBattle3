name: Migrate to C
on: 
  workflow_dispatch: # Запускать вручную в разделе Actions

permissions:
  contents: write # Даем права на запись в репозиторий

jobs:
  burn_rust_build_c:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Нужно для корректного пуша

      - name: Delete Rust stuff
        run: |
          # Удаляем старые файлы Rust
          rm -rf src
          rm -f Cargo.toml
          rm -f Cargo.lock
          # Создаем новую структуру папок
          mkdir -p jni
          mkdir -p .github/workflows

      - name: Create CMakeLists.txt
        run: |
          cat <<'EOF' > CMakeLists.txt
          cmake_minimum_required(VERSION 3.10.2)
          project(cubicbattle)

          # native_app_glue - это стандарт для C на Android
          add_library(native_app_glue STATIC
              ${ANDROID_NDK}/sources/android/native_app_glue/android_native_app_glue.c)

          add_library(cubicbattle SHARED jni/main.c)

          target_include_directories(cubicbattle PRIVATE
              ${ANDROID_NDK}/sources/android/native_app_glue)

          find_library(log-lib log)
          find_library(android-lib android)
          find_library(egl-lib EGL)
          find_library(gles-lib GLESv3)

          target_link_libraries(cubicbattle 
              native_app_glue
              ${log-lib} 
              ${android-lib} 
              ${egl-lib} 
              ${gles-lib})
          EOF

      - name: Create main.c
        run: |
          cat <<'EOF' > jni/main.c
          #include <EGL/egl.h>
          #include <GLES3/gl3.h>
          #include <android/log.h>
          #include <android_native_app_glue.h>
          #include <stdlib.h>

          #define LOG_TAG "CubicBattle_C"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)

          void android_main(struct android_app* state) {
              LOGI("C version started! Rust has been purged! 🦭🔥");
              
              while (1) {
                  int ident, events;
                  struct android_poll_source* source;
                  
                  while ((ident = ALooper_pollAll(0, NULL, &events, (void**)&source)) >= 0) {
                      if (source != NULL) source->process(state, source);
                      if (state->destroyRequested != 0) return;
                  }

                  // Рендер (просто очистка экрана в красный для теста)
                  glClearColor(1.0f, 0.0f, 0.0f, 1.0f);
                  glClear(GL_COLOR_BUFFER_BIT);
              }
          }
          EOF

      - name: Create NEW CI (build-c.yml)
        run: |
          cat <<'EOF' > .github/workflows/build-c.yml
          name: Build C APK
          on: [push]
          jobs:
            build:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - name: Set up NDK
                  uses: nttld/setup-ndk@v1
                  with:
                    ndk-version: r25c
                - name: Build with CMake
                  run: |
                    cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                          -DANDROID_ABI=arm64-v8a \
                          -DANDROID_PLATFORM=android-24 \
                          .
                    make
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name "C-Migrator"
          git config --global user.email "migrator@example.com"
          git add .
          git commit -m "Migration to C Complete: Pure C version initialized 🦭🚀"
          git push origin main # Если у тебя ветка называется master, замени main на master
