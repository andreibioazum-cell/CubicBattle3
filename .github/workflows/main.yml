name: Build Pure Rust APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          echo "y" | sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust Library
        run: |
          cargo ndk -t arm64-v8a -o app/src/main/jniLibs build --release

      - name: Generate Android Project & Package APK
        run: |
          mkdir -p app/src/main/res/values

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Cubic Battle"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name="android.app.NativeActivity"
                            android:exported="true"
                            android:configChanges="orientation|keyboardHidden|screenSize">
                      <meta-data android:name="android.app.lib_name" android:value="cubicbattle" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Cubic Battle</string>
          </resources>
          EOF

          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "CubicBattle"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # ИСПРАВЛЕННЫЙ app/build.gradle (убран символ # из комментария)
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.cubicbattle.nativeapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.cubicbattle.nativeapp"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  ndk {
                      abiFilters 'arm64-v8a' // Только 64-бит
                  }
              }
          }
          dependencies {}
          EOF

          rm -rf .gradle
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle-Rust-APK
          path: app/build/outputs/apk/debug/*.apk
